<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><title>微博 MCN 商业探测中枢 - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: -apple-system, system-ui; background: var(--bg); padding: 40px 0; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1100px; width: 95%; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .canvas-area { border: 2px dashed var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; border: none; outline: none; font-size: 15px; resize: none; }
        .btn { padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; justify-content: center;}
        .btn-main { background: var(--primary); color: #fff; }
        .btn-pause { background: #ef4444; color: #fff; display: none; }
        .progress-box { margin: 20px 0; display: none; }
        .track { width: 100%; height: 8px; background: #eee; border-radius: 10px; overflow: hidden; }
        .bar { width: 0%; height: 100%; background: var(--primary); transition: 0.4s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; text-align: left; }
        th { padding: 12px; border-bottom: 2px solid #eee; color: #64748b; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; }
        #authOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>
    <div id="authOverlay">
        <h2 id="overlayTitle" style="color:#ef4444; margin-bottom: 10px;">🚨 需要人工介入</h2>
        <p id="overlayDesc" style="margin-bottom: 30px; font-size: 15px; text-align: center;">系统已安全挂起队列。</p>
        <button class="btn btn-main" style="background:#ef4444; font-size: 16px;" onclick="invokeLogin()">立即唤醒浏览器处理</button>
    </div>

    <div class="container">
        <h1 style="text-align:center; margin-bottom: 30px; color: #1e293b;">🚀 MCN 商业探测中枢</h1>
        <div class="canvas-area">
            <textarea id="targetInput" placeholder="在此粘贴博主主页链接、昵称或拖入Excel文件..."></textarea>
            <div id="parseNote" style="font-size:12px; color:var(--primary); margin-top:5px"></div>
        </div>
        <div style="display:flex; gap:10px; justify-content:center">
            <button class="btn btn-main" id="startBtn" onclick="startBatch()">⚡ 开始专业探测</button>
            <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">⏸ 暂停任务</button>
            <button class="btn" style="background:#eee; color:#333;" onclick="document.getElementById('fileInput').click()">📎 上传文件</button>
            <button class="btn" id="exportBtn" style="background:#10b981; color:#fff; display:none" onclick="exportExcel()">📥 导出分析报表</button>
        </div>
        <div class="progress-box" id="progressBox">
            <div id="progText" style="font-size:12px; margin-bottom:5px; color:#666">准备就绪...</div>
            <div class="track"><div class="bar" id="progressBar"></div></div>
        </div>
        <table>
            <thead><tr>
                <th>状态</th>
                <th>原始目标链接</th>
                <th>博主真实昵称</th>
                <th>粉丝体量</th>
                <th>平均阅读</th>
                <th>平均互动</th>
                <th>图文报价</th>
                <th>CPM</th>
            </tr></thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <input type="file" id="fileInput" style="display:none" onchange="importExcel(this.files[0])">
    
    <script>
        let queue = [], isPaused = false, isRunning = false, stats = {total:0, done:0}, history = [];
        let consecutiveErrors = 0;

        function importExcel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                let scores = (rows[0]||[]).map(() => 0);
                const blacklist = ["Id", "ID", "编号", "部门", "系统", "日期", "金额", "序号", "链接", "状态", "目标", "昵称", "博主", "粉丝", "报价", "阅读", "互动", "CPM"];
                rows.slice(0, 20).forEach(row => {
                    row.forEach((v, i) => {
                        let s = String(v||"").trim();
                        if(blacklist.some(b => s.includes(b)) || s === "链接") scores[i] -= 100;
                        if(/weibo\.com/.test(s)) scores[i] += 100;
                        if(/^\d{8,14}$/.test(s)) scores[i] += 50;
                        if(s.length > 2 && s.length < 15 && !/[\d.]/.test(s)) scores[i] += 10;
                    });
                });
                let best = scores.indexOf(Math.max(...scores));
                if(best === -1 || scores[best] < 0) return alert("未识别到有效账号列！");
                
                let targets = [...new Set(rows.map(r => String(r[best]||"").trim()).filter(v => v && !blacklist.some(b => v.includes(b)) && v !== "链接"))];
                document.getElementById('targetInput').value = targets.join('\n');
                document.getElementById('parseNote').innerText = `已智能提取 ${targets.length} 条有效待测目标`;
            };
            reader.readAsArrayBuffer(file);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').innerText = isPaused ? "⚡ 继续任务" : "⏸ 暂停任务";
            if (!isPaused && isRunning) {
                consecutiveErrors = 0;
                runQueueMaster();
            }
        }

        async function startBatch() {
            const val = document.getElementById('targetInput').value.trim();
            if(!val) return;
            queue = val.split('\n').filter(s => s.trim());
            stats = {total: queue.length, done: 0}; history = []; isRunning = true; isPaused = false; consecutiveErrors = 0;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').innerText = "⏸ 暂停任务";
            document.getElementById('pauseBtn').style.display = 'block';
            document.getElementById('progressBox').style.display = 'block';
            document.getElementById('resultBody').innerHTML = '';
            runQueueMaster();
        }

        async function runQueueMaster() {
            while (queue.length > 0 && isRunning && !isPaused) {
                let target = queue.shift();
                let keepRunning = await processSingleTask(target);
                
                if (!keepRunning) break;
                await new Promise(r => setTimeout(r, 1500)); 
            }
            if (queue.length === 0 && stats.done === stats.total && stats.total > 0) {
                finalize();
            }
        }

        async function processSingleTask(target) {
            try {
                const r = await fetch('/api/v1/collect', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({target})
                });
                
                consecutiveErrors = 0;

                if (r.status === 401 || r.status === 403) {
                    queue.unshift(target); 
                    isRunning = false; 
                    document.getElementById('overlayTitle').innerText = r.status === 401 ? "🚨 授权已失效" : "🚨 触发防爬验证";
                    document.getElementById('overlayDesc').innerHTML = r.status === 401 
                        ? "系统已安全挂起队列。<br><br>👉 WEIQ 平台登录已掉线，请点击下方按钮唤醒浏览器，<b>重新登录</b>后关掉即可恢复。"
                        : "系统已安全挂起队列。<br><br>👉 WEIQ 平台弹出了防爬滑块，请点击下方按钮唤醒浏览器，<b>手动滑动验证</b>后关掉即可恢复。";
                    document.getElementById('authOverlay').style.display = 'flex';
                    return false; 
                }

                if (r.status === 429 || r.status === 500) {
                    const errJson = await r.json().catch(()=>({detail: "系统级网络或环境错误"}));
                    queue.unshift(target); 
                    isPaused = true;       
                    document.getElementById('pauseBtn').innerText = "⚡ 继续任务";
                    alert(`🚨 引擎已物理刹车，绝不盲跑！\n\n卡住目标：${target}\n致命原因：${errJson.detail}\n\n请检查黑窗口报错或网络后，点击"继续任务"恢复。`);
                    return false; 
                }

                const json = await r.json().catch(()=>({detail: "未知响应"}));

                if (json.status === "failed") {
                    render('❌', target, null, json.detail);
                } else if (json.status === "success") {
                    render('✅', target, json.data);
                    history.push(json.data);
                }
                stats.done++;
                updateProgress();
                return true; 

            } catch(e) {
                consecutiveErrors++;
                if (consecutiveErrors >= 3) {
                    queue.unshift(target);
                    isPaused = true;
                    document.getElementById('pauseBtn').innerText = "⚡ 继续任务";
                    alert(`🚨 强行物理熔断！\n连续 3 次网络彻底断连。已为您强行刹车，绝不盲跑！\n检查网络后点击"继续"恢复。`);
                    return false; 
                }
                render('❌', target, null, "系统网络断开，跳过");
                stats.done++;
                updateProgress();
                return true;
            }
        }

        // 全新渲染布局，突出展现核心维度
        function render(icon, target, d, errMsg = "查询受限或无效数据") {
            const tr = document.createElement('tr');
            tr.innerHTML = d ? `<td>${icon}</td>
                <td style="color:#94a3b8; font-size:12px; max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${target}">${target}</td>
                <td style="color:#0f172a; font-weight:600; font-size:14px;">${d.nickname}</td>
                <td style="color:#10b981; font-weight:bold">${d.followers}</td>
                <td style="color:#6366f1;">${d.avg_read}</td>
                <td style="color:#f59e0b;">${d.avg_interact}</td>
                <td style="color:#ef4444; font-weight:bold; font-size:14px;">¥${d.commercial.original_price}</td>
                <td style="color:#64748b;">¥${d.commercial.cpm}</td>`
                           : `<td>${icon}</td>
                <td style="color:#94a3b8; font-size:12px; max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${target}">${target}</td>
                <td colspan="6" style="color:#ef4444; font-weight:500">${errMsg}</td>`;
            document.getElementById('resultBody').insertBefore(tr, document.getElementById('resultBody').firstChild);
        }

        function updateProgress() {
            let p = Math.round(stats.done / stats.total * 100);
            document.getElementById('progressBar').style.width = p + '%';
            document.getElementById('progText').innerText = `已扫描: ${stats.done} / ${stats.total}`;
        }

        async function invokeLogin() {
            document.getElementById('overlayTitle').innerText = "🚀 正在唤醒浏览器...";
            document.getElementById('overlayDesc').innerText = "请在弹出的窗口中操作，完成后随手关闭即可恢复任务。";
            await fetch('/api/v1/login', {method: 'POST'});
            document.getElementById('authOverlay').style.display = 'none';
            isRunning = true;
            runQueueMaster(); 
        }

        function finalize() {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "⚡ 重新探测";
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('exportBtn').style.display = 'flex';
        }

        function exportExcel() {
            // 在导出前平铺数据结构，使导出的Excel更直观
            const flatData = history.map(item => ({
                "博主昵称": item.nickname,
                "真实UID": item.uid,
                "粉丝体量": item.followers,
                "图文报价": item.commercial.original_price,
                "直发CPM": item.commercial.cpm,
                "平均阅读": item.avg_read,
                "平均互动": item.avg_interact
            }));
            const ws = XLSX.utils.json_to_sheet(flatData);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "专业报表");
            XLSX.writeFile(wb, `MCN商业洞察报表_${Date.now()}.xlsx`);
        }
    </script>
</body>
</html>
